name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'ndk;27.0.12077973'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,x86_64-linux-android

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            aegis-mesh/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('aegis-mesh/Cargo.lock') }}

      - name: Build Rust core for Android
        working-directory: aegis-mesh
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/27.0.12077973
        run: |
          export CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android26-clang"
          export CARGO_TARGET_X86_64_LINUX_ANDROID_LINKER="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/x86_64-linux-android26-clang"
          export CC_aarch64_linux_android="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android26-clang"
          export CC_x86_64_linux_android="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/x86_64-linux-android26-clang"
          cargo build --release -p aegis-ffi --target aarch64-linux-android
          cargo build --release -p aegis-ffi --target x86_64-linux-android

      - name: Copy native libraries
        working-directory: aegis-mesh
        run: |
          mkdir -p android/app/src/main/jniLibs/arm64-v8a
          mkdir -p android/app/src/main/jniLibs/x86_64
          cp target/aarch64-linux-android/release/libaegis_ffi.so android/app/src/main/jniLibs/arm64-v8a/
          cp target/x86_64-linux-android/release/libaegis_ffi.so android/app/src/main/jniLibs/x86_64/

      - name: Generate UniFFI Kotlin bindings
        working-directory: aegis-mesh
        run: |
          cargo run --bin uniffi-bindgen-cli -- generate \
            --library target/aarch64-linux-android/release/libaegis_ffi.so \
            --language kotlin \
            --out-dir android/app/src/main/java/network/aegis/mesh/ffi/ || true
          # If uniffi-bindgen fails, use the hand-written bindings (already in repo)
          echo "Bindings generated (or hand-written bindings used)"

      - name: Build debug APK
        working-directory: aegis-mesh/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: aegis-mesh-debug-apk
          path: aegis-mesh/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 90
